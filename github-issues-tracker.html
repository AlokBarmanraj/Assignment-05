<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSIGNMENT-5</title>
    <!-- Daisy ui and Tailwindcss CDN -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome CDN -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Css link -->
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bg-white max-w-[1920px]">
        <div class="flex justify-between w-11/12 mx-auto py-8">
            <div class="flex items-center">
                <i class="fa-brands fa-github text-5xl"></i>
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-3 items-cente">
                <label class="input">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    </svg>
                    <input type="search" required placeholder="Search issues..." />
                </label> 
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>


    <!-- main section -->
     <main class="max-w-[1920px] bg-[#F8FAFC] py-16">
        <!-- button -->
        <section>
            <div class="bg-white w-9/12 mx-auto py-6 pl-6 shadow-2xl rounded-lg space-x-3">
                <button class="btn btn-primary text-xl font-bold py-5 px-12">All</button>
                <button class="btn text-xl font-bold py-5 px-10">Open</button>
                <button class="btn text-xl font-bold py-5 px-10">Closed</button>
            </div>
        </section> 
        
        
        <!-- all issues -->
         <div class="bg-white w-9/12 mx-auto py-6 shadow-2xl rounded-lg mt-5">
            <div class="flex justify-between px-6 items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-[#ECE4FF] w-12 h-12 rounded-full flex justify-center items-center">
                        <i class="fa-solid fa-life-ring text-2xl text-[#4A00FF]"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-semibold">50 Issues</h3>
                        <p class="text-slate-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-5">
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-circle text-[#00A96E]"></i>
                        <p class="font-bold">Open</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-circle text-[#A855F7]"></i>
                        <p class="font-bold">Closed</p>
                    </div>
                </div>
            </div>
         </div>
     </main>
</body>
</html>
