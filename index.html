<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSIGNMENT-5</title>
    <!-- Daisy ui and Tailwindcss CDN -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome CDN -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Css link -->
     <link rel="stylesheet" href="style.css">
     <!-- Favicon -->
     <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
</head>
<body>
    <!-- Sign in  -->
    <main class="w-[520px] mx-auto mt-[79px] py-10 bg-white shadow-2xl rounded-xl">
        <div class="text-center space-y-2">
            <div class="text-8xl">
                <i class="fa-brands fa-github"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-slate-500">Sign in to manage your issues</p>
            </div>
        </div>
        <div>
                <fieldset class="fieldset w-10/12 mx-auto pt-5">
                <label class="label text-xl font-bold">Username</label>
                <input id="input-username" type="text" class="input w-full rounded-lg" placeholder="Enter Username" />

                <div class="text-sky-400">Default:admin</div>
                <label class="label text-xl font-bold">Password</label>
                <input id="input-password" type="password" maxlength="8" class="input w-full rounded-xl" placeholder="Enter Password" />

                <div class="text-sky-400">Default:admin123</div>
                <button id="sign-in-btn" class="btn btn-primary mt-4 rounded-lg">Sign In</button>
                </fieldset>
        </div>
    </main>






    <script src="script/sign-in.js"></script>
</body>
</html>
